<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urla Portföy Grafik</title>
    
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- TradingView Lightweight Charts Local -->
    <script src="lightweight-charts.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css?v=1.3">
</head>
<body data-theme="dark">
    <header class="app-header">
        <div class="header-logo">
            <div class="logo-icon"><i class="fa-solid fa-chart-line"></i></div>
            <div class="logo-text">
                <h1>URLA PORTFÖY</h1>
                <span>GRAFİK SİSTEMİ</span>
            </div>
        </div>
        
        <div class="header-stats">
            <div class="stat-card" id="usdtry-card">
                <span class="stat-label">USD / TRY</span>
                <span class="stat-value" id="usdtry-value">Yükleniyor...</span>
                <span class="stat-meta" id="usdtry-time">--:--:--</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Toplam Hisse</span>
                <span class="stat-value" id="total-stocks-count">14</span>
                <span class="stat-meta">Dolar Bazlı Takip</span>
            </div>
        </div>
        
        <div class="header-actions">
            <button id="theme-toggle-btn" class="btn btn-secondary" title="Tema Değiştir">
                <i class="fa-solid fa-moon"></i>
            </button>
            <button id="import-portfolio-btn" class="btn btn-secondary" title="Portföy İçe Aktar (.json)">
                <i class="fa-solid fa-file-import"></i> İçe Aktar
            </button>
            <button id="add-stock-btn" class="btn btn-secondary" title="Hisse Ekle">
                <i class="fa-solid fa-plus"></i> Hisse Ekle
            </button>
            <button id="download-portfolio-btn" class="btn btn-secondary" title="Portföy İndir (JSON)">
                <i class="fa-solid fa-file-arrow-down"></i> İndir
            </button>
            <button id="update-all-btn" class="btn btn-primary" title="Tümünü Güncelle">
                <i class="fa-solid fa-rotate"></i> Tümünü Güncelle
            </button>
        </div>
    </header>

    <main class="dashboard-container">
        <div class="grid-container" id="stocks-grid">
            <!-- Stock Cards will be dynamically generated by JS -->
            <div class="loader-container" id="initial-loader">
                <div class="spinner"></div>
                <p>Veriler Yahoo Finance'ten çekiliyor ve USD bazlı hesaplanıyor...</p>
            </div>
        </div>
    </main>

    <!-- Add Stock Modal -->
    <div id="add-stock-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Yeni Hisse Senedi Ekle</h2>
                <button class="modal-close" id="close-modal-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="stock-ticker-input">Hisse Sembolü (Örn: CCOLA.IS, THYAO.IS, AAPL, KO)</label>
                    <input type="text" id="stock-ticker-input" placeholder="Sembolü girin... (BIST için sonuna .IS ekleyin)" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="stock-name-input">Hisse Adı (Örn: Coca-Cola, Türk Hava Yolları, Apple)</label>
                    <input type="text" id="stock-name-input" placeholder="Hisse adını girin..." autocomplete="off">
                </div>
                <div class="modal-error" id="modal-error-msg" style="display: none;"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancel-modal-btn">Vazgeç</button>
                <button class="btn btn-primary" id="save-stock-btn">Ekle</button>
            </div>
        </div>
    </div>

    <!-- Hidden file input for portfolio import -->
    <input type="file" id="portfolio-file-input" accept=".json" style="display: none;">

    <footer class="app-footer">
        <p>&copy; 2026 Urla Portföy Grafik. Veriler 15 dakika gecikmelidir. Grafik gücü: TradingView Lightweight Charts.</p>
    </footer>

    <!-- Frontend App Logic -->
    <script src="app.js?v=1.5"></script>
</body>
</html>
